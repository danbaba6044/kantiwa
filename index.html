<!DOCTYPE html>
<html>
<head>
    <title>Smart Agro-Cloud</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: green;
        }
        .card {
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>
</head>

<body>

<h1>Smart Agro-Cloud 🌾</h1>
<p>Live Market Prices for Farmers</p>

<div class="card">
    <h3>Rice</h3>
    <p>₦45,000</p>
    <p>Mile 3 Market, Port Harcourt</p>
</div>

<div class="card">
    <h3>Maize</h3>
    <p>₦30,000</p>
    <p>Oil Mill Market</p>
</div>

<div class="card">
    <h3>Yam</h3>
    <p>₦25,000</p>
    <p>Creek Road Market</p>
</div>

</body>
</html>
